<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=128, height=64, initial-scale=1" />
  <title>OLED</title>
  <link rel="stylesheet" href="/oled.css" />
  <style>
    body { margin: 0; padding: 0; width: 128px; height: 64px; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
    #root { width: 128px; height: 64px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class="oled">
  <div id="root" class="oled-view">{{WIDGET_HTML}}</div>
  <script>window.__INITIAL_STATE__ = {{INITIAL_STATE}};</script>
  <script>
    (function() {
      const root = document.getElementById("root");
      const POLL_MS = 150;

      function renderWidget(widget, motion) {
        if (!widget) return "";
        if (widget.type === "time") {
          return '<section class="widget-time"><div class="time-main">' + (widget.time_main || "--:--") + '<span class="seconds">:' + (widget.seconds || "--") + '</span></div><div class="time-date"><span class="day">' + (widget.day ?? "-") + '</span> <span class="month">' + (widget.month || "---") + '</span></div></section>';
        }
        if (widget.type === "click_counter") {
          return '<section class="widget-counter"><div class="counter-number">' + (widget.count ?? 0) + '</div></section>';
        }
        if (widget.type === "timer") {
          const flashClass = widget.flash ? " flash" : "";
          return '<section class="widget-timer' + flashClass + '"><div class="timer-badges">' + (widget.running ? "Run" : "Stop") + '</div><div class="timer-value">' + (widget.time_text || "05:00") + '</div></section>';
        }
        if (widget.type === "motion_status") {
          return '<section class="widget-motion"><div class="status-grid"><div class="status-tile"><div class="status-label">Motion</div><div class="status-value">' + (widget.motion_detected ? "Yes" : "No") + '</div></div><div class="status-tile"><div class="status-label">Display</div><div class="status-value">' + (widget.display_state || "ON") + '</div></div><div class="status-tile"><div class="status-label">Idle</div><div class="status-value">' + (widget.idle || "00:00") + '</div></div></div></section>';
        }
        if (widget.type === "photo") {
          if (widget.has_image && widget.image_base64) {
            return '<section class="widget-photo"><img src="data:image/png;base64,' + widget.image_base64 + '" alt="BW" style="max-width:128px;max-height:64px;" /></section>';
          }
          return '<section class="widget-photo"><div style="font-size:8px;text-align:center;">No photo</div></section>';
        }
        if (widget.type === "app_launcher") {
          return '<section class="widget-counter"><div style="font-size:9px;text-align:center;line-height:1.2;">PRESS DIAL<br/>TO START</div></section>';
        }
        return '<section class="widget-time"><div class="time-main">?</div></section>';
      }

      function renderApp(app, exitState) {
        if (!app) return "";
        if (app.type === "pong") {
          const field = app.field || { width: 128, height: 64 };
          const ball = app.ball || { x: 0, y: 0, size: 2 };
          const player = app.player || { x: 0, y: 0, width: 2, height: 12 };
          const cpu = app.cpu || { x: 0, y: 0, width: 2, height: 12 };
          const score = app.score || { player: 0, cpu: 0 };
          const exitProgressRaw = Number(exitState.progress || 0);
          const exitProgress = Math.max(0, Math.min(1, exitProgressRaw));
          const pct = (value, total) => ((value / total) * 100).toFixed(2) + "%";
          return (
            '<section class="app-pong">' +
            '<div class="pong-score">' + score.player + ' : ' + score.cpu + '</div>' +
            '<div class="pong-field" style="--exit-progress:' + exitProgress + ';">' +
            '<div class="pong-divider"></div>' +
            '<div class="pong-paddle player" style="left:' + pct(player.x, field.width) + '; top:' + pct(player.y, field.height) + '; width:' + pct(player.width, field.width) + '; height:' + pct(player.height, field.height) + ';"></div>' +
            '<div class="pong-paddle cpu" style="left:' + pct(cpu.x, field.width) + '; top:' + pct(cpu.y, field.height) + '; width:' + pct(cpu.width, field.width) + '; height:' + pct(cpu.height, field.height) + ';"></div>' +
            '<div class="pong-ball" style="left:' + pct(ball.x, field.width) + '; top:' + pct(ball.y, field.height) + '; width:' + pct(ball.size, field.width) + '; height:' + pct(ball.size, field.height) + ';"></div>' +
            '<div class="pong-exit"></div>' +
            '</div>' +
            '</section>'
          );
        }
        return '<section class="widget-time"><div class="time-main">APP</div></section>';
      }

      function render(state) {
        if (!state) return;
        if (state.mode === "app" && state.active_app) {
          root.innerHTML = renderApp(state.active_app, state.app_exit || {});
          return;
        }
        if (state.active_widget) {
          root.innerHTML = renderWidget(state.active_widget, state.motion || {});
        }
      }

      function fetchState() {
        fetch("/api/state", { cache: "no-store" })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(state) {
            render(state);
          })
          .catch(function() {});
      }

      if (window.__INITIAL_STATE__) {
        render(window.__INITIAL_STATE__);
      }
      fetchState();
      setInterval(fetchState, POLL_MS);
    })();
  </script>
</body>
</html>
